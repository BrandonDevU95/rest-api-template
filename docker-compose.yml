services:
  mysql:
    image: mysql:8.4
    container_name: boilerplate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: boilerplate_db
      MYSQL_USER: boilerplate_user
      MYSQL_PASSWORD: boilerplate_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - boilerplate-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boilerplate-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: /api/v1
      APP_NAME: rest-api-boilerplate
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: boilerplate_db
      DB_USER: boilerplate_user
      DB_PASSWORD: boilerplate_pass
      DB_LOGGING: 'false'
      JWT_ACCESS_SECRET: change_this_access_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change_this_refresh_secret
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 12
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: debug
      LOG_DIR: logs
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_LOGIN_MAX_REQUESTS: 10
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - boilerplate-net

  phpmyadmin:
    image: phpmyadmin:5.2.1
    container_name: boilerplate-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: boilerplate_user
      PMA_PASSWORD: boilerplate_pass
    ports:
      - '8081:80'
    networks:
      - boilerplate-net

volumes:
  mysql_data:

networks:
  boilerplate-net:
    driver: bridge
