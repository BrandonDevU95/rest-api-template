name: ${PROJECT_SLUG:-rest-api-template}

services:
  mysql:
    image: mysql:8.4
    container_name: ${PROJECT_SLUG:-rest-api-template}-mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_SLUG:-rest-api-template}-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - app-net

  phpmyadmin:
    image: phpmyadmin:5.2.1
    container_name: ${PROJECT_SLUG:-rest-api-template}-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '8081:80'
    networks:
      - app-net

volumes:
  mysql_data:

networks:
  app-net:
    name: ${PROJECT_SLUG:-rest-api-template}-net
    driver: bridge
