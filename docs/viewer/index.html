<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centro de Documentacion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="hero container-xl py-4 py-lg-5 position-relative">
      <div class="row g-3 align-items-end">
        <div class="col-lg-8">
          <p class="eyebrow mb-2">REST API TEMPLATE</p>
          <h1 class="mb-2">Centro de Documentacion</h1>
          <p class="subtitle mb-0">
            Vista HTML para leer README y la documentacion tecnica sin salir del navegador.
          </p>
        </div>
        <div class="col-lg-4 d-flex justify-content-lg-end">
          <nav class="hero-actions" aria-label="Navegacion de documentacion">
            <a class="action-link is-active" href="/documentation" aria-current="page"
              >Centro de Documentacion</a
            >
            <a class="action-link" href="/api-docs">Swagger API Docs</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container-xl pb-4 pb-lg-5 position-relative">
      <div class="row g-3 g-lg-4">
        <aside class="col-12 col-lg-4 col-xl-3">
          <div class="sidebar card-glass">
            <h2 class="sidebar-title">Documentos</h2>
            <form id="search-form" class="search-form" role="search">
              <label for="search-input">Buscar en la documentacion</label>
              <div class="search-controls">
                <input
                  id="search-input"
                  name="search"
                  type="search"
                  placeholder="Ej: token, rate limit, docker..."
                  minlength="2"
                />
                <button type="submit">Buscar</button>
              </div>
              <p id="search-status" class="search-status">
                Escribe al menos 2 caracteres para buscar.
              </p>
            </form>
            <nav>
              <ul id="doc-list"></ul>
            </nav>
            <section class="search-results-wrap" aria-live="polite">
              <h3>Resultados</h3>
              <ul id="search-results" class="search-results"></ul>
            </section>
          </div>
        </aside>

        <section class="col-12 col-lg-8 col-xl-9" aria-live="polite">
          <div class="content card-glass">
            <div class="content-header">
              <h2 id="doc-title">Selecciona un documento</h2>
              <a id="raw-link" href="#" target="_blank" rel="noopener noreferrer">Abrir markdown</a>
            </div>
            <article id="doc-content" class="markdown-body"></article>
          </div>
        </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js" defer></script>
  </body>
</html>
