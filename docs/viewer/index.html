<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centro de Documentacion</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <header class="hero">
      <p class="eyebrow">REST API TEMPLATE</p>
      <h1>Centro de Documentacion</h1>
      <p class="subtitle">
        Vista HTML para leer README y la documentacion tecnica sin salir del navegador.
      </p>
      <nav class="hero-actions" aria-label="Navegacion de documentacion">
        <a class="action-link is-active" href="/documentation" aria-current="page"
          >Centro de Documentacion</a
        >
        <a class="action-link" href="/api-docs">Swagger API Docs</a>
      </nav>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Documentos</h2>
        <form id="search-form" class="search-form" role="search">
          <label for="search-input">Buscar en la documentacion</label>
          <div class="search-controls">
            <input
              id="search-input"
              name="search"
              type="search"
              placeholder="Ej: token, rate limit, docker..."
              minlength="2"
            />
            <button type="submit">Buscar</button>
          </div>
          <p id="search-status" class="search-status">Escribe al menos 2 caracteres para buscar.</p>
        </form>
        <nav>
          <ul id="doc-list"></ul>
        </nav>
        <section class="search-results-wrap" aria-live="polite">
          <h3>Resultados</h3>
          <ul id="search-results" class="search-results"></ul>
        </section>
      </aside>

      <section class="content" aria-live="polite">
        <div class="content-header">
          <h2 id="doc-title">Selecciona un documento</h2>
          <a id="raw-link" href="#" target="_blank" rel="noopener noreferrer">Abrir markdown</a>
        </div>
        <article id="doc-content" class="markdown-body"></article>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
